<!doctype html><meta charset=utf-8><meta name=viewport content="width=device-width"><title>SAC Themes</title><style>body{font:16px Arial;margin:25px;background:#eef1f3}.g{display:grid;grid-template-columns:1fr 1fr;gap:12px}.g a{padding:26px;background:var(--a);color:var(--b);border:3px solid var(--b);border-radius:15px;text-decoration:none;font-weight:bold;box-shadow:inset 0 -10px var(--b)}small{display:block;margin-top:7px}@media(max-width:600px){.g{grid-template-columns:1fr}}</style><h1>اختر هوية SAC</h1><p>12 هوية، وكل زر يعرض الهوية بشكل معكوس.</p><div class=g id=g></div><script>let N={blackplatinum:'أسود بلاتيني',royalnavy:'كحلي ملكي',emerald:'زمردي ذهبي',navy:'كحلي برتقالي',plum:'بنفسجي نحاسي',earth:'بني رملي',electric:'سيان كهربائي',lime:'لايم لوجستي',digital:'لافندر رقمي',terra:'تيراكوتا صناعي',mono:'أسود نيون',teal:'تيال سلامة'};fetch('themes.json?v=3').then(r=>r.json()).then(T=>g.innerHTML=Object.keys(N).map(k=>{let v=T[k];return `<a style="--a:${v[2]};--b:${v[0]}" href="index.html?theme=${k}">${N[k]}<small>${v[2]} / ${v[0]}</small></a>`}).join(''))</script>
