<!doctype html><meta charset=utf-8><meta name=viewport content="width=device-width"><title>SAC Themes</title><style>body{font:16px Arial;margin:25px;background:#eef1f3}.g{display:grid;grid-template-columns:1fr 1fr;gap:12px}.g a{padding:26px;background:var(--a);color:var(--b);border:3px solid var(--b);border-radius:15px;text-decoration:none;font-weight:bold;box-shadow:inset 0 -10px var(--b)}small{display:block;margin-top:7px}@media(max-width:600px){.g{grid-template-columns:1fr}}</style><h1>اختر هوية SAC</h1><p>الأزرار تعرض ألوان الهوية بشكل معكوس.</p><div class=g id=g></div><script>let x=[['emerald','زمردي ذهبي','#c9a55a','#0d1f1b'],['navy','كحلي برتقالي','#ff7a1a','#071522'],['plum','بنفسجي نحاسي','#d08a62','#23172a'],['earth','بني رملي','#d8aa62','#2b1b14'],['electric','سيان كهربائي','#00d8ff','#101827'],['lime','لايم لوجستي','#c7ff38','#17210d'],['digital','لافندر رقمي','#b98cff','#241631'],['terra','تيراكوتا صناعي','#ff8a5c','#311512'],['mono','أسود نيون','#d8ff3e','#0b0b0c'],['teal','تيال سلامة','#ffb000','#10252c']];g.innerHTML=x.map(t=>`<a style="--a:${t[2]};--b:${t[3]}" href="index.html?theme=${t[0]}">${t[1]}<small>${t[0]}</small></a>`).join('')</script>
