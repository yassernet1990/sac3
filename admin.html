<!doctype html><meta charset=utf-8><meta name=viewport content="width=device-width"><title>SAC Theme Studio</title><link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;600;700;800&display=swap" rel=stylesheet><style>*{box-sizing:border-box}body{margin:0;font-family:Alexandria;background:radial-gradient(circle at top right,#17332c,#07110e 48%);color:#f7f3e8}.w{width:min(1180px,calc(100% - 30px));margin:auto}.top{padding:28px 0;display:flex;justify-content:space-between;align-items:center}.brand{font-weight:800;font-size:22px}.brand b{color:#c9a55a}.open{color:#07110e;background:#c9a55a;padding:12px 18px;border-radius:999px;text-decoration:none;font-weight:700}.hero{padding:38px 0 26px;border-top:1px solid #ffffff18}.tag{color:#8fc9b6;font-size:13px;font-weight:700}.hero h1{font-size:clamp(32px,6vw,64px);line-height:1;margin:12px 0}.hero p{color:#aebbb6;max-width:720px}.g{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:28px 0 60px}.c{position:relative;min-height:210px;border-radius:24px;padding:22px;text-decoration:none;color:#fff;overflow:hidden;border:1px solid #ffffff1c;box-shadow:0 20px 50px #0005;transition:.25s;background:linear-gradient(145deg,var(--d),var(--p))}.c:hover{transform:translateY(-6px)}.n{position:absolute;top:18px;left:18px;font-size:12px;opacity:.55}.c h3{margin:0 0 6px;font-size:20px}.c small{opacity:.7}.sw{display:flex;gap:8px;position:absolute;bottom:20px;right:20px}.sw i{width:34px;height:34px;border-radius:50%;border:3px solid #fff3}.go{position:absolute;bottom:22px;left:22px;font-size:24px}@media(max-width:850px){.g{grid-template-columns:1fr 1fr}}@media(max-width:560px){.g{grid-template-columns:1fr}.c{min-height:180px}}</style><div class=w><div class=top><div class=brand>SAC <b>THEME STUDIO</b></div><a class=open href=site.html>فتح الموقع</a></div><div class=hero><div class=tag>IDENTITY CONTROL CENTER</div><h1>اختر هوية<br>الموقع.</h1><p>16 هوية بصرية، منها 4 هويات مصممة خصيصًا لشركات النقل والموانئ والأساطيل والمستودعات.</p></div><div class=g id=g></div></div><script>let N={blackplatinum:'أسود بلاتيني',royalnavy:'كحلي ملكي',emerald:'زمردي ذهبي',navy:'كحلي برتقالي',plum:'بنفسجي نحاسي',earth:'بني رملي',electric:'سيان كهربائي',lime:'لايم لوجستي',digital:'لافندر رقمي',terra:'تيراكوتا صناعي',mono:'أسود نيون',teal:'تيال سلامة',logisticport:'لوجستي موانئ',logisticfleet:'لوجستي أسطول',logisticcargo:'لوجستي شحن',logisticwarehouse:'لوجستي مستودعات'};fetch('themes-v6.json?v=6').then(r=>r.json()).then(T=>g.innerHTML=Object.keys(N).map((k,i)=>{let v=T[k];return `<a class=c style="--d:${v[0]};--p:${v[1]}" href="site.html?theme=${k}"><span class=n>${String(i+1).padStart(2,'0')}</span><h3>${N[k]}</h3><small>${k}</small><div class=sw>${v.map(x=>`<i style="background:${x}"></i>`).join('')}</div><span class=go>↗</span></a>`}).join(''))</script>
