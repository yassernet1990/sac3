<!doctype html><meta charset=utf-8><meta name=viewport content="width=device-width"><title>SAC Themes</title><style>body{margin:0;background:#eee;color:#123;font-family:Arial}.w{max-width:900px;margin:40px auto;padding:20px}h1{margin:0 0 8px}.g{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin:28px 0}.c{border:0;border-radius:18px;padding:28px;text-align:left;color:#fff;cursor:pointer;font-size:20px;font-weight:700;min-height:150px}.c span{display:block;font-size:13px;margin-top:12px;opacity:.8}.a{background:#0d1f1b}.b{background:#0d2234}.d{background:#39263f}.e{background:#3a2417}.x{display:inline-block;padding:13px 18px;background:#111;color:#fff;text-decoration:none;border-radius:10px}@media(max-width:600px){.g{grid-template-columns:1fr}}</style><div class=w><h1>لوحة هويات SAC</h1><p>اختر الهوية، ثم افتح الموقع الرئيسي.</p><div class=g><button class="c a" data-t=emerald>زمردي ذهبي<span>أخضر داكن + ذهبي</span></button><button class="c b" data-t=navy>كحلي برتقالي<span>كحلي احترافي + برتقالي</span></button><button class="c d" data-t=plum>بنفسجي نحاسي<span>بنفسجي داكن + نحاسي</span></button><button class="c e" data-t=earth>بني رملي<span>بني عميق + رملي</span></button></div><a class=x href=index.html>فتح الموقع</a></div><script>document.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{localStorage.setItem('sac-theme',b.dataset.t);alert('تم اعتماد الهوية: '+b.textContent.trim())})</script>
